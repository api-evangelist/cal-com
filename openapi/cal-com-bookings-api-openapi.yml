  /v2/bookings/{bookingUid}/location:
    patch:
      operationId: BookingLocationController_2024_08_13_updateBookingLocation
      summary: Update booking location for an existing booking
      description: 'Updates the location for an existing booking.


        **Integration Fallback Behavior:**

        - **Google Meet**: Requires Google Calendar to be connected. If the booking has no Google Calendar event, it will automatically fall back to Cal Video.

        - **MS Teams**: If Office 365 Calendar is connected, generates the meeting link via calendar. Otherwise, uses the MS Teams video integration directly.


        <Note>The cal-api-version header is required for this endpoint. Without it, the request will fail with a 404 error.</Note>'
      parameters:
      - name: cal-api-version
        in: header
        description: Must be set to 2024-08-13. This header is required as this endpoint does not exist in older API versions.
        required: true
        schema:
          type: string
      - name: bookingUid
        required: true
        in: path
        schema:
          type: string
      - name: Authorization
        in: header
        description: value must be `Bearer <token>` where `<token>` is api key prefixed with cal_ or managed user access token
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookingLocationInput_2024_08_13'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateBookingLocationOutput_2024_08_13'
      tags:
      - Bookings
components:
  schemas:
    Routing:
      type: object
      properties:
        responseId:
          type: number
          description: The ID of the routing form response that determined this booking assignment.
          example: 123
        teamMemberIds:
          description: Array of team member IDs that were routed to handle this booking.
          example:
          - 101
          - 102
          type: array
          items:
            type: number
        teamMemberEmail:
          type: string
          description: The email of the team member assigned to handle this booking.
          example: john.doe@example.com
        skipContactOwner:
          type: boolean
          description: Whether to skip contact owner assignment from CRM integration.
          example: true
        crmAppSlug:
          type: string
          description: The CRM application slug for integration.
          example: salesforce
        crmOwnerRecordType:
          type: string
          description: The CRM owner record type for contact assignment.
          example: Account
      required:
      - responseId
      - teamMemberIds
    CreateBookingInput_2024_08_13:
      type: object
      properties:
        start:
          type: string
          description: The start time of the booking in ISO 8601 format in UTC timezone.
          example: '2024-08-13T09:00:00Z'
        attendee:
          description: The attendee's details.
          allOf:
          - $ref: '#/components/schemas/CreateBookingAttendee'
        bookingFieldsResponses:
          type: object
          description: Booking field responses consisting of an object with booking field slug as keys and user response as values for custom booking fields added by you.
          example:
            customField: customValue
        eventTypeId:
          type: number
          description: The ID of the event type that is booked. Required unless eventTypeSlug and username are provided as an alternative to identifying the event type.
          example: 123
        eventTypeSlug:
          type: string
          description: The slug of the event type. Required along with username / teamSlug and optionally organizationSlug if eventTypeId is not provided.
          example: my-event-type
        username:
          type: string
          description: The username of the event owner. Required along with eventTypeSlug and optionally organizationSlug if eventTypeId is not provided.
          example: john-doe
        teamSlug:
          type: string
          description: Team slug for team that owns event type for which slots are fetched. Required along with eventTypeSlug and optionally organizationSlug if the team is part of organization
          example: john-doe
        organizationSlug:
          type: string
          description: The organization slug. Optional, only used when booking with eventTypeSlug + username or eventTypeSlug + teamSlug.
          example: acme-corp
        guests:
          description: An optional list of guest emails attending the event.
          example:
          - guest1@example.com
          - guest2@example.com
          type: array
          items:
            type: string
        meetingUrl:
          type: string
          description: Deprecated - use 'location' instead. Meeting URL just for this booking. Displayed in email and calendar event. If not provided then cal video link will be generated.
          example: https://example.com/meeting
          deprecated: true
        location:
          description: One of the event type locations. If instead of passing one of the location objects as required by schema you are still passing a string please use an object.
          oneOf:
          - $ref: '#/components/schemas/BookingInputAddressLocation_2024_08_13'
          - $ref: '#/components/schemas/BookingInputAttendeeAddressLocation_2024_08_13'
          - $ref: '#/components/schemas/BookingInputAttendeeDefinedLocation_2024_08_13'
          - $ref: '#/components/schemas/BookingInputAttendeePhoneLocation_2024_08_13'
          - $ref: '#/components/schemas/BookingInputIntegrationLocation_2024_08_13'
          - $ref: '#/components/schemas/BookingInputLinkLocation_2024_08_13'
          - $ref: '#/components/schemas/BookingInputPhoneLocation_2024_08_13'
          - $ref: '#/components/schemas/BookingInputOrganizersDefaultAppLocation_2024_08_13'
        metadata:
          type: object
          description: You can store any additional data you want here. Metadata must have at most 50 keys, each key up to 40 characters, and string values up to 500 characters.
          example:
            key: value
        lengthInMinutes:
          type: number
          example: 30
          description: "If it is an event type that has multiple possible lengths that attendee can pick from, you can pass the desired booking length here.\n    If not provided then event type default length will be used for the booking."
        routing:
          description: Routing information from routing forms that determined the booking assignment. Both responseId and teamMemberIds are required if provided.
          example:
            responseId: 123
            teamMemberIds:
            - 101
            - 102
          allOf:
          - $ref: '#/components/schemas/Routing'
        emailVerificationCode:
          type: string
          description: Email verification code required when event type has email verification enabled.
          example: '123456'
      required:
      - start
      - attendee
    RecurringBookingOutput_2024_08_13:
      type: object
      properties:
        id:
          type: number
          example: 123
        uid:
          type: string
          example: booking_uid_123
