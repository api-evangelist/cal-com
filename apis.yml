        type: OpenAPI
    description: Mark users as out-of-office for a date range, with optional automatic forwarding to a delegate.
  - aid: cal-com:cal-com-conferencing-api
    name: Cal.com Conferencing API
    tags:
      - Conferencing
      - Video
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/api-reference/v2/conferencing
    baseURL: https://api.cal.com/v2
    properties:
      - url: https://cal.com/docs/api-reference/v2/conferencing
        type: APIReference
      - url: openapi/cal-com-openapi.json
        type: OpenAPI
    description: >-
      Connect and manage video-conferencing apps (Zoom, Google Meet, Microsoft Teams, Cal Video, Daily, etc.) used as
      event-type locations.
  - aid: cal-com:cal-com-destination-calendars-api
    name: Cal.com Destination Calendars API
    tags:
      - Calendars
      - Integration
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/api-reference/v2/destination-calendars
    baseURL: https://api.cal.com/v2
    properties:
      - url: https://cal.com/docs/api-reference/v2/destination-calendars
        type: APIReference
      - url: openapi/cal-com-openapi.json
        type: OpenAPI
    description: >-
      Connect Google, Outlook/Office 365, Apple, and CalDAV calendars; choose where new bookings are written and where
      conflicts are read from.
  - aid: cal-com:cal-com-atoms-api
    name: Cal.com Atoms (Platform)
    tags:
      - Atoms
      - SDK
      - Embed
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/platform
    baseURL: https://api.cal.com/v2
    properties:
      - url: https://cal.com/docs/platform
        type: Documentation
      - url: https://www.npmjs.com/package/@calcom/atoms
        type: SDKs
      - url: openapi/cal-com-openapi.json
        type: OpenAPI
    description: >-
      Cal.com Platform exposes pre-built React components ("Atoms") and a managed-user OAuth model so SaaS apps can
      embed scheduling primitives end-to-end. Used by platforms that want to ship Cal.com features under their own
      brand.
