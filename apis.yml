aid: cal-com
url: https://raw.githubusercontent.com/api-evangelist/cal-com/refs/heads/main/apis.yml
name: Cal.com
kind: company
description: >-
  Cal.com is open-source scheduling infrastructure (Calendly alternative) available as a managed cloud service or
  self-hosted deployment. The Cal.com API v2 exposes bookings, event types, schedules, availability, slots, webhooks,
  OAuth, teams, organizations, OOO, conferencing, destination calendars, and the Cal.com Atoms (Platform) for embedding
  scheduling primitives into other apps.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Productivity
  - Scheduling
  - Calendar
  - Open Source
  - Booking
created: '2026-05-08'
modified: '2026-05-30'
specificationVersion: '0.19'
apis:
  - aid: cal-com:cal-com-bookings-api
    name: Cal.com Bookings API
    tags:
      - Bookings
      - CRUD
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/api-reference/v2/bookings
    baseURL: https://api.cal.com/v2
    properties:
      - url: https://cal.com/docs/api-reference
        type: Documentation
      - url: https://cal.com/docs/api-reference/v2/bookings
        type: APIReference
      - url: openapi/cal-com-openapi.json
        type: OpenAPI
    description: Create, read, update, cancel, and reschedule bookings. Supports recurring, seated, and round-robin booking flows.
  - aid: cal-com:cal-com-event-types-api
    name: Cal.com Event Types API
    tags:
      - Event Types
      - Configuration
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/api-reference/v2/event-types
    baseURL: https://api.cal.com/v2
    properties:
      - url: https://cal.com/docs/api-reference/v2/event-types
        type: APIReference
      - url: openapi/cal-com-openapi.json
        type: OpenAPI
    description: >-
      Manage event types (meeting templates) — duration, location, fields, locations, payment, recurrence, and team
      round-robin assignments.
  - aid: cal-com:cal-com-schedules-api
    name: Cal.com Schedules API
    tags:
      - Schedules
      - Working Hours
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/api-reference/v2/schedules
    baseURL: https://api.cal.com/v2
    properties:
      - url: https://cal.com/docs/api-reference/v2/schedules
        type: APIReference
      - url: openapi/cal-com-openapi.json
        type: OpenAPI
    description: Manage user schedules — weekly working hours, date overrides, and timezone defaults.
  - aid: cal-com:cal-com-availability-api
    name: Cal.com Availability API
    tags:
      - Availability
      - Calendar
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/api-reference/v2/availability
    baseURL: https://api.cal.com/v2
    properties:
      - url: https://cal.com/docs/api-reference/v2/availability
        type: APIReference
      - url: openapi/cal-com-openapi.json
        type: OpenAPI
    description: Compute and read user/team availability across event types, accounting for connected calendars and overrides.
  - aid: cal-com:cal-com-slots-api
    name: Cal.com Slots API
    tags:
      - Slots
      - Time
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/api-reference/v2/slots
    baseURL: https://api.cal.com/v2
    properties:
      - url: https://cal.com/docs/api-reference/v2/slots
        type: APIReference
      - url: openapi/cal-com-openapi.json
        type: OpenAPI
    description: >-
      Reserve, list, and release bookable time slots for event types — used by booking page UIs to lock a slot before
      confirmation.
  - aid: cal-com:cal-com-webhooks-api
    name: Cal.com Webhooks API
    tags:
      - Webhooks
      - Events
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/api-reference/v2/webhooks
    baseURL: https://api.cal.com/v2
    properties:
      - url: https://cal.com/docs/api-reference/v2/webhooks
        type: APIReference
      - url: openapi/cal-com-openapi.json
        type: OpenAPI
      - url: asyncapi/cal-com-webhooks-asyncapi.yaml
        type: AsyncAPI
    description: >-
      Subscribe to BOOKING_CREATED, BOOKING_RESCHEDULED, BOOKING_CANCELLED, MEETING_STARTED, and other events;
      deliveries POST to a developer-defined endpoint.
  - aid: cal-com:cal-com-oauth-api
    name: Cal.com OAuth & Auth API
    tags:
      - OAuth
      - Authentication
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/api-reference/v2/oauth
    baseURL: https://api.cal.com/v2
    properties:
      - url: https://cal.com/docs/api-reference/v2/oauth
        type: APIReference
      - url: openapi/cal-com-openapi.json
        type: OpenAPI
    description: >-
      OAuth client management, token issuance, and refresh — primarily used by Cal.com Platform integrations to manage
      end-user accounts under a hosting application.
  - aid: cal-com:cal-com-teams-api
    name: Cal.com Teams API
    tags:
      - Teams
      - Membership
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/api-reference/v2/teams
    baseURL: https://api.cal.com/v2
    properties:
      - url: https://cal.com/docs/api-reference/v2/teams
        type: APIReference
      - url: openapi/cal-com-openapi.json
        type: OpenAPI
    description: Manage teams, team members, and team event types for collective and round-robin scheduling.
  - aid: cal-com:cal-com-organizations-api
    name: Cal.com Organizations API
    tags:
      - Organizations
      - Enterprise
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/api-reference/v2/organizations
    baseURL: https://api.cal.com/v2
    properties:
      - url: https://cal.com/docs/api-reference/v2/organizations
        type: APIReference
      - url: openapi/cal-com-openapi.json
        type: OpenAPI
    description: Top-level organizations API for managing sub-teams, members, and organization-wide event types and routing forms.
  - aid: cal-com:cal-com-ooo-api
    name: Cal.com Out-of-Office API
    tags:
      - OOO
      - Availability
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cal.com/docs/api-reference/v2/out-of-office
    baseURL: https://api.cal.com/v2
