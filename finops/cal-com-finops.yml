description: FOCUS-aligned FinOps profile for Cal.com. The managed cloud bills per-user
  monthly across Free, Teams ($12), Organizations ($28), and Enterprise (custom). The
  Cal.com Platform (Atoms / managed users) is sold separately, typically priced on
  managed-user volume. Self-hosted has no platform fees.
