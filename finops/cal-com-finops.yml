meters:
- name: user_seats
  description: Per-user monthly subscription. Teams $12, Organizations $28, Enterprise
    contract.
  unit: seat
  aggregation: sum
  dimensions:
  - account
  - team
  - plan
- name: platform_managed_users
  description: Cal.com Platform managed-user volume meter for embedded SaaS deployments.
  unit: managed_user
  aggregation: sum
  dimensions:
  - oauth_client
  - account
principles:
- name: Visibility
  description: Inventory active users in the Cal.com admin panel; track Platform managed-user
    counts separately.
- name: Allocation
  description: Allocate user seats by team membership; allocate Platform spend to the SaaS
    product embedding scheduling.
- name: Optimization
  description: Reclaim seats from inactive users; choose annual billing for the 25% discount;
    consider self-hosting for very large deployments where engineering capacity is available.
- name: Accountability
  description: Assign an owner per Cal.com organization; review Platform managed-user count
    against forecast.
