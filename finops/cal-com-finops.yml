serviceCategory: Productivity
billingModel:
  pricingCategory: Subscription (Per Seat) + Platform Volume
  billingFrequency: Monthly or Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Cal.com
