      path: /v2/calendars/{calendar}/check
      operations:
      - name: calendarscontrollercheck
        method: GET
        description: Check a calendar connection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
