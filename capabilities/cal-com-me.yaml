naftiko: 1.0.0-alpha2
info:
  label: Cal.diy API v2 — Me
  description: 'Cal.diy API v2 — Me. 2 operations. Lead operation: Get my profile. Self-contained Naftiko capability covering
    one Cal Com business surface.'
  tags:
  - Cal Com
  - Me
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CAL_COM_API_KEY: CAL_COM_API_KEY
capability:
  consumes:
  - type: http
    namespace: cal-com-me
    baseUri: ''
    description: Cal.diy API v2 — Me business capability. Self-contained, no shared references.
    resources:
    - name: v2-me
      path: /v2/me
      operations:
      - name: mecontrollergetme
        method: GET
        description: Get my profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: value must be `Bearer <token>` where `<token>` is api key prefixed with cal_ or managed user access
            token
          required: true
      - name: mecontrollerupdateme
        method: PATCH
        description: Update my profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Authorization
          in: header
          type: string
          description: value must be `Bearer <token>` where `<token>` is api key prefixed with cal_ or managed user access
            token
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: cal-com-me-rest
    port: 8080
    description: REST adapter for Cal.diy API v2 — Me. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v2/me
      name: v2-me
      description: REST surface for v2-me.
      operations:
      - method: GET
        name: mecontrollergetme
        description: Get my profile
        call: cal-com-me.mecontrollergetme
        with:
          Authorization: rest.Authorization
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: mecontrollerupdateme
        description: Update my profile
        call: cal-com-me.mecontrollerupdateme
        with:
          Authorization: rest.Authorization
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cal-com-me-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cal.diy API v2 — Me. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-my-profile
      description: Get my profile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cal-com-me.mecontrollergetme
      with:
        Authorization: tools.Authorization
      outputParameters:
      - type: object
        mapping: $.
    - name: update-my-profile
      description: Update my profile
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cal-com-me.mecontrollerupdateme
      with:
        Authorization: tools.Authorization
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
